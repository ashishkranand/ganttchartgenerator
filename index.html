<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Gantt Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Custom Scrollbars */
        .custom-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        /* Theme Definitions */
        .theme-modern {
            --primary: #3b82f6;
            --bg: #ffffff;
            --text: #1e293b;
            --bar: #60a5fa;
        }

        .theme-dark {
            --primary: #818cf8;
            --bg: #0f172a;
            --text: #f8fafc;
            --bar: #4f46e5;
        }

        .theme-academic {
            --primary: #111827;
            --bg: #fcfcfc;
            --text: #000000;
            --bar: #374151;
        }

        .theme-pastel {
            --primary: #f472b6;
            --bg: #fff1f2;
            --text: #881337;
            --bar: #fb7185;
        }

        .theme-vibrant {
            --primary: #10b981;
            --bg: #f0fdf4;
            --text: #064e3b;
            --bar: #34d399;
        }

        .gantt-container {
            background-color: var(--bg);
            color: var(--text);
        }

        .task-bar {
            background-color: var(--bar);
        }
    </style>
</head>

<body class="bg-slate-50 font-sans min-h-screen">

    <div id="app" class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">ResearchGantt <span
                    class="text-blue-600">Pro</span></h1>
            <p class="text-slate-500 mt-2">Powered by Ashish Kr. Anand</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 flex items-center">1. Project Details</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Project Title</label>
                            <input type="text" id="projectTitle" placeholder="e.g. Molecular Biology Thesis"
                                class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Select Design</label>
                            <select id="themeSelect" class="w-full mt-1 p-2 border rounded-lg bg-white">
                                <option value="theme-modern">Modern Corporate (Blue)</option>
                                <option value="theme-dark">Midnight Sleek (Dark)</option>
                                <option value="theme-academic">Formal Academic (B&W)</option>
                                <option value="theme-pastel">Soft Pastel (Pink)</option>
                                <option value="theme-vibrant">Eco Vibrant (Green)</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4">2. Add Tasks</h2>
                    <div id="taskInputs" class="space-y-4 max-h-96 overflow-y-auto pr-2">
                        <div class="task-row p-3 bg-slate-50 rounded-lg border border-slate-100 space-y-2">
                            <input type="text" placeholder="Task name"
                                class="task-name w-full p-2 text-sm rounded border">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="date" class="task-start w-full p-2 text-xs rounded border">
                                <input type="date" class="task-end w-full p-2 text-xs rounded border">
                            </div>
                        </div>
                    </div>
                    <button onclick="addTaskRow()"
                        class="w-full mt-4 py-2 border-2 border-dashed border-slate-300 text-slate-500 rounded-lg hover:border-blue-400 hover:text-blue-500 transition-all">+
                        Add Phase/Task</button>
                </section>

                <button onclick="generateChart()"
                    class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transform transition active:scale-95">Generate
                    Chart</button>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-bold text-slate-800">Preview</h2>
                        <div class="flex gap-2">
                            <button onclick="exportImage('png')"
                                class="px-3 py-1 bg-slate-100 hover:bg-slate-200 rounded text-xs font-semibold">PNG</button>
                            <button onclick="exportImage('jpg')"
                                class="px-3 py-1 bg-slate-100 hover:bg-slate-200 rounded text-xs font-semibold">JPG</button>
                            <button onclick="exportExcel()"
                                class="px-3 py-1 bg-green-100 hover:bg-green-200 text-green-700 rounded text-xs font-semibold">EXCEL</button>
                        </div>
                    </div>

                    <div id="ganttExportArea"
                        class="theme-modern gantt-container border rounded-xl overflow-hidden min-h-[400px]">
                        <div class="p-6">
                            <h3 id="displayTitle" class="text-2xl font-bold mb-8">Your Research Project</h3>
                            <div class="overflow-x-auto custom-scroll">
                                <div id="ganttGrid" class="min-w-[600px] relative pb-4">
                                    <div class="text-center py-20 text-slate-400 italic">Enter tasks and click "Generate
                                        Chart" to visualize.</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function addTaskRow() {
            const container = document.getElementById('taskInputs');
            const div = document.createElement('div');
            div.className = 'task-row p-3 bg-slate-50 rounded-lg border border-slate-100 space-y-2 relative group';
            div.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs opacity-0 group-hover:opacity-100 transition-opacity">×</button>
                <input type="text" placeholder="Task name" class="task-name w-full p-2 text-sm rounded border">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" class="task-start w-full p-2 text-xs rounded border">
                    <input type="date" class="task-end w-full p-2 text-xs rounded border">
                </div>
            `;
            container.appendChild(div);
        }

        function generateChart() {
            const title = document.getElementById('projectTitle').value || "Research Project Timeline";
            const theme = document.getElementById('themeSelect').value;
            const container = document.getElementById('ganttExportArea');
            const grid = document.getElementById('ganttGrid');

            document.getElementById('displayTitle').innerText = title;
            container.className = `gantt-container border rounded-xl overflow-hidden min-h-[400px] ${theme}`;

            const taskRows = document.querySelectorAll('.task-row');
            let tasks = [];

            taskRows.forEach(row => {
                const name = row.querySelector('.task-name').value;
                const start = row.querySelector('.task-start').value;
                const end = row.querySelector('.task-end').value;
                if (name && start && end) tasks.push({ name, start: new Date(start), end: new Date(end) });
            });

            if (tasks.length === 0) return alert("Please add at least one task with dates.");

            // Calculate range
            const minDate = new Date(Math.min(...tasks.map(t => t.start)));
            const maxDate = new Date(Math.max(...tasks.map(t => t.end)));
            const totalDays = (maxDate - minDate) / (1000 * 60 * 60 * 24) + 1;

            // Render
            grid.innerHTML = '';

            // Header Dates
            const dateHeader = document.createElement('div');
            dateHeader.className = 'flex border-b mb-4 text-[10px] font-bold uppercase tracking-wider opacity-60';
            dateHeader.style.marginLeft = '150px';

            // Simple Month Marking
            const months = Math.ceil(totalDays / 30);
            for (let i = 0; i <= months; i++) {
                const d = new Date(minDate);
                d.setDate(d.getDate() + (i * 30));
                const mDiv = document.createElement('div');
                mDiv.style.width = `${(30 / totalDays) * 100}%`;
                mDiv.innerText = d.toLocaleDateString('default', { month: 'short' });
                dateHeader.appendChild(mDiv);
            }
            grid.appendChild(dateHeader);

            // Task Bars
            tasks.forEach(task => {
                const row = document.createElement('div');
                row.className = 'flex items-center mb-3 h-10';

                const label = document.createElement('div');
                label.className = 'w-[150px] pr-4 text-sm font-medium truncate';
                label.innerText = task.name;

                const barContainer = document.createElement('div');
                barContainer.className = 'flex-1 relative h-full bg-slate-100/50 rounded-lg overflow-hidden';

                const bar = document.createElement('div');
                bar.className = 'task-bar absolute h-full rounded shadow-sm flex items-center justify-center text-[10px] text-white font-bold';

                const left = ((task.start - minDate) / (1000 * 60 * 60 * 24) / totalDays) * 100;
                const width = (((task.end - task.start) / (1000 * 60 * 60 * 24) + 1) / totalDays) * 100;

                bar.style.left = `${left}%`;
                bar.style.width = `${width}%`;

                barContainer.appendChild(bar);
                row.appendChild(label);
                row.appendChild(barContainer);
                grid.appendChild(row);
            });
        }

        async function exportImage(format) {
            const element = document.getElementById('ganttExportArea');
            const canvas = await html2canvas(element, { scale: 2 });
            const data = canvas.toDataURL(`image/${format}`);
            const link = document.createElement('a');
            link.download = `research-gantt.${format}`;
            link.href = data;
            link.click();
        }

        function exportExcel() {
            const taskRows = document.querySelectorAll('.task-row');
            let data = [["Task Name", "Start Date", "End Date"]];

            taskRows.forEach(row => {
                const name = row.querySelector('.task-name').value;
                const start = row.querySelector('.task-start').value;
                const end = row.querySelector('.task-end').value;
                if (name) data.push([name, start, end]);
            });

            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Gantt Data");
            XLSX.writeFile(wb, "Research_Data.xlsx");
        }
    </script>
</body>

</html>
